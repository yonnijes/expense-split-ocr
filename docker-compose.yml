version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: expense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: local_dev_password
      POSTGRES_DB: expenses_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U expense_user -d expenses_db']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: expense-api
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      NODE_ENV: development
      PORT: 8000
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://expense_user:local_dev_password@postgres:5432/expenses_db?schema=public
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-1.5-flash
      JWT_SECRET: local_dev_secret_change_in_production
      JWT_EXPIRES_IN: 48h
      MAX_FILE_SIZE: 5242880
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:8000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: apps/web-portal/Dockerfile
    container_name: expense-portal
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
