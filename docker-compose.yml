version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: expense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: local_dev_password
      POSTGRES_DB: expenses_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U expense_user -d expenses_db' ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: expense-api
    ports:
      - '8000:8000'
    environment:
      NODE_ENV: development
      PORT: 8000
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://expense_user:local_dev_password@postgres:5432/expenses_db?schema=public
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-1.5-flash
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET}
      JWT_SECRET: local_dev_secret_change_in_production
      JWT_EXPIRES_IN: 48h
      MAX_FILE_SIZE: 5242880
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: nx serve api

  web:
    build:
      context: .
      dockerfile: apps/web-portal/Dockerfile
    container_name: expense-portal
    ports:
      - '4200:4200'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL_INTERNAL: http://api:8000
    volumes:
      - .:/app
      - /app/node_modules
    command: npx nx serve web-portal
    depends_on:
      - api

volumes:
  postgres_data:
